<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FPGEE Mock Exam — Connectek Rx Success</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy: #0a1628;
    --navy-light: #112240;
    --teal: #00b4a6;
    --teal-light: #00d4c4;
    --gold: #f5a623;
    --gold-light: #ffc55c;
    --white: #f8fafc;
    --gray-100: #e8edf4;
    --gray-300: #94a3b8;
    --gray-500: #64748b;
    --correct: #10b981;
    --wrong: #ef4444;
    --card-bg: #0f1e35;
    --border: rgba(0,180,166,0.2);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND MESH ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 20%, rgba(0,180,166,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 80%, rgba(245,166,35,0.05) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(0,180,166,0.03) 80px),
      repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(0,180,166,0.03) 80px);
    pointer-events: none;
    z-index: 0;
  }

  /* ── SCREENS ── */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: block; }

  /* ══════════════════════════════════════════
     LANDING SCREEN
  ══════════════════════════════════════════ */
  #landing {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }

  .brand-badge {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(0,180,166,0.12);
    border: 1px solid var(--teal);
    border-radius: 40px;
    padding: 8px 22px;
    margin-bottom: 32px;
    animation: fadeSlideDown 0.6s ease both;
  }
  .brand-badge .rx-icon {
    width: 28px; height: 28px;
    background: var(--teal);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: var(--navy);
  }
  .brand-badge span {
    font-size: 13px; font-weight: 600; letter-spacing: 0.08em;
    color: var(--teal); text-transform: uppercase;
  }

  .landing-logo {
    font-family: 'Playfair Display', serif;
    font-size: clamp(16px, 3vw, 22px);
    font-weight: 700;
    color: var(--teal-light);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 6px;
    animation: fadeSlideDown 0.7s ease 0.1s both;
  }
  .landing-tagline {
    font-size: 13px; color: var(--gray-300);
    letter-spacing: 0.05em;
    margin-bottom: 48px;
    animation: fadeSlideDown 0.7s ease 0.15s both;
  }
  .landing-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 7vw, 72px);
    font-weight: 900;
    line-height: 1.05;
    margin-bottom: 20px;
    animation: fadeSlideDown 0.8s ease 0.2s both;
  }
  .landing-title em { font-style: normal; color: var(--teal); }
  .landing-title .gold { color: var(--gold); }

  .landing-desc {
    max-width: 540px;
    font-size: 17px; line-height: 1.7;
    color: var(--gray-300);
    margin-bottom: 48px;
    animation: fadeSlideDown 0.8s ease 0.3s both;
  }

  .stats-row {
    display: flex; gap: 40px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 52px;
    animation: fadeSlideDown 0.8s ease 0.4s both;
  }
  .stat { text-align: center; }
  .stat .val {
    font-family: 'Playfair Display', serif;
    font-size: 36px; font-weight: 900; color: var(--teal);
    display: block;
  }
  .stat .lbl { font-size: 12px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.1em; }

  .divider-gold {
    width: 60px; height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--teal));
    border-radius: 2px; margin: 0 auto 52px;
    animation: fadeSlideDown 0.8s ease 0.35s both;
  }

  .domains-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px; max-width: 900px; width: 100%;
    margin-bottom: 52px;
    animation: fadeSlideDown 0.8s ease 0.45s both;
  }
  .domain-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 20px;
    text-align: left;
    transition: border-color 0.2s, transform 0.2s;
  }
  .domain-card:hover { border-color: var(--teal); transform: translateY(-3px); }
  .domain-card .dnum {
    font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
    color: var(--teal); text-transform: uppercase; margin-bottom: 8px;
  }
  .domain-card .dtitle {
    font-size: 14px; font-weight: 600; color: var(--white);
    margin-bottom: 6px; line-height: 1.4;
  }
  .domain-card .drange {
    font-size: 12px; color: var(--gray-500);
    font-family: 'DM Mono', monospace;
  }
  .domain-card .dbar {
    margin-top: 14px; height: 3px; border-radius: 2px;
    background: rgba(0,180,166,0.15);
    position: relative; overflow: hidden;
  }
  .domain-card .dbar::after {
    content: ''; position: absolute; left: 0; top: 0;
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--teal), var(--teal-light));
    border-radius: 2px;
    transition: width 1.5s ease 0.5s;
  }

  .btn-start {
    display: inline-flex; align-items: center; gap: 12px;
    background: linear-gradient(135deg, var(--teal), var(--teal-light));
    color: var(--navy); font-family: 'DM Sans', sans-serif;
    font-size: 17px; font-weight: 700;
    border: none; border-radius: 50px;
    padding: 18px 48px; cursor: pointer;
    box-shadow: 0 0 40px rgba(0,180,166,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeSlideDown 0.8s ease 0.55s both;
  }
  .btn-start:hover { transform: scale(1.05); box-shadow: 0 0 60px rgba(0,180,166,0.5); }
  .btn-start svg { transition: transform 0.2s; }
  .btn-start:hover svg { transform: translateX(4px); }

  /* ══════════════════════════════════════════
     EXAM SCREEN
  ══════════════════════════════════════════ */
  #exam { min-height: 100vh; }

  .exam-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,22,40,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .header-brand {
    font-family: 'Playfair Display', serif;
    font-size: 14px; font-weight: 700;
    color: var(--teal); letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .header-sep { width: 1px; height: 24px; background: var(--border); }

  .progress-wrap { flex: 1; min-width: 160px; }
  .progress-label {
    font-size: 11px; color: var(--gray-500);
    font-family: 'DM Mono', monospace;
    margin-bottom: 5px;
    display: flex; justify-content: space-between;
  }
  .progress-bar {
    height: 4px; background: rgba(255,255,255,0.08);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--teal), var(--teal-light));
    transition: width 0.4s ease;
  }

  .timer-badge {
    display: flex; align-items: center; gap: 8px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 15px; font-weight: 500;
    color: var(--teal);
    white-space: nowrap;
  }
  .timer-badge.warning { color: var(--gold); border-color: var(--gold); animation: pulse 1s infinite; }
  .timer-badge.danger { color: var(--wrong); border-color: var(--wrong); animation: pulse 0.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  .score-pill {
    background: rgba(245,166,35,0.12);
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: 20px; padding: 6px 14px;
    font-size: 13px; font-weight: 600; color: var(--gold);
    white-space: nowrap;
  }

  /* ── DOMAIN TABS ── */
  .domain-tabs {
    display: flex; gap: 0;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    padding: 0 24px;
  }
  .domain-tab {
    padding: 12px 20px;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--gray-500);
    border-bottom: 2px solid transparent;
    cursor: pointer; white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
  }
  .domain-tab:hover { color: var(--gray-100); }
  .domain-tab.active { color: var(--teal); border-bottom-color: var(--teal); }
  .domain-tab .tab-count {
    display: inline-block; margin-left: 6px;
    background: rgba(0,180,166,0.15); border-radius: 10px;
    padding: 1px 7px; font-size: 10px; color: var(--teal);
  }

  /* ── QUESTION LAYOUT ── */
  .exam-body { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }

  .domain-heading {
    font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--teal);
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 10px;
  }
  .domain-heading::before {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .questions-list { display: flex; flex-direction: column; gap: 24px; }

  .q-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    transition: border-color 0.3s, box-shadow 0.3s;
    scroll-margin-top: 120px;
  }
  .q-card.answered { border-color: rgba(0,180,166,0.35); }
  .q-card.current { border-color: var(--teal); box-shadow: 0 0 30px rgba(0,180,166,0.15); }

  .q-number {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--gray-500);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .q-number .q-tag {
    background: rgba(0,180,166,0.1); border-radius: 8px;
    padding: 3px 8px; color: var(--teal); font-weight: 500;
  }

  .q-text {
    font-size: 16px; line-height: 1.65; font-weight: 500;
    color: var(--white);
    margin-bottom: 22px;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .opt-btn {
    display: flex; align-items: flex-start; gap: 14px;
    background: rgba(255,255,255,0.03);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 18px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px; line-height: 1.5;
    color: var(--gray-100);
    text-align: left;
    transition: all 0.2s ease;
    width: 100%;
  }
  .opt-btn:hover:not(:disabled) {
    background: rgba(0,180,166,0.08);
    border-color: rgba(0,180,166,0.4);
    color: var(--white);
    transform: translateX(3px);
  }
  .opt-btn:disabled { cursor: default; }

  .opt-letter {
    display: flex; align-items: center; justify-content: center;
    min-width: 26px; height: 26px;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 12px; font-weight: 600; color: var(--gray-300);
    transition: all 0.2s;
    margin-top: 1px;
  }

  .opt-btn.selected {
    background: rgba(0,180,166,0.12);
    border-color: var(--teal);
    color: var(--white);
  }
  .opt-btn.selected .opt-letter {
    background: var(--teal); border-color: var(--teal); color: var(--navy);
  }
  .opt-btn.correct {
    background: rgba(16,185,129,0.12);
    border-color: var(--correct);
    color: var(--white);
  }
  .opt-btn.correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
  .opt-btn.wrong {
    background: rgba(239,68,68,0.1);
    border-color: var(--wrong);
    color: rgba(255,255,255,0.6);
  }
  .opt-btn.wrong .opt-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }

  .q-feedback {
    margin-top: 14px; padding: 12px 16px;
    border-radius: 10px; font-size: 13.5px;
    display: none; align-items: center; gap: 10px;
  }
  .q-feedback.show { display: flex; }
  .q-feedback.correct-fb { background: rgba(16,185,129,0.12); color: #34d399; }
  .q-feedback.wrong-fb { background: rgba(239,68,68,0.1); color: #f87171; }

  /* ── FLOATING NAV ── */
  .float-nav {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
    background: rgba(15,30,53,0.95);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 10px 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    z-index: 200;
  }
  .nav-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 30px; padding: 8px 18px;
    color: var(--gray-300); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .nav-btn:hover { border-color: var(--teal); color: var(--teal); }
  .nav-btn.primary {
    background: var(--teal); border-color: var(--teal);
    color: var(--navy); font-weight: 700;
  }
  .nav-btn.primary:hover { background: var(--teal-light); }
  .nav-btn.danger-btn {
    background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.3);
    color: #f87171;
  }
  .nav-btn.danger-btn:hover { background: rgba(239,68,68,0.2); }

  .unanswered-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--gray-500);
    padding: 0 8px;
  }

  /* ══════════════════════════════════════════
     RESULTS SCREEN
  ══════════════════════════════════════════ */
  #results {
    min-height: 100vh;
    padding: 60px 20px;
    max-width: 900px; margin: 0 auto;
  }

  .results-header { text-align: center; margin-bottom: 52px; }
  .results-brand {
    font-family: 'Playfair Display', serif;
    font-size: 14px; color: var(--teal);
    letter-spacing: 0.15em; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .results-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 900; margin-bottom: 8px;
  }
  .results-title.pass { color: var(--correct); }
  .results-title.fail { color: var(--wrong); }
  .results-subtitle { font-size: 16px; color: var(--gray-300); }

  .score-circle-wrap { display: flex; justify-content: center; margin: 40px 0; }
  .score-circle {
    position: relative; width: 200px; height: 200px;
  }
  .score-circle svg { transform: rotate(-90deg); }
  .score-circle-text {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-pct {
    font-family: 'Playfair Display', serif;
    font-size: 44px; font-weight: 900;
  }
  .score-pct.pass { color: var(--correct); }
  .score-pct.fail { color: var(--wrong); }
  .score-lbl { font-size: 12px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.1em; }

  .result-stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px; margin-bottom: 40px;
  }
  .rstat {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 22px 18px; text-align: center;
  }
  .rstat .rv { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; }
  .rstat .rl { font-size: 12px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
  .rstat.correct-stat .rv { color: var(--correct); }
  .rstat.wrong-stat .rv { color: var(--wrong); }
  .rstat.skip-stat .rv { color: var(--gold); }
  .rstat.time-stat .rv { color: var(--teal); font-size: 24px; }

  .domain-breakdown { margin-bottom: 48px; }
  .domain-breakdown h3 {
    font-family: 'Playfair Display', serif;
    font-size: 22px; margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .domain-row {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .domain-row-label { font-size: 13px; color: var(--gray-300); min-width: 220px; }
  .domain-row-bar {
    flex: 1; min-width: 100px; height: 8px;
    background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden;
  }
  .domain-row-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--teal), var(--teal-light));
    transition: width 1s ease 0.3s;
  }
  .domain-row-score {
    font-family: 'DM Mono', monospace;
    font-size: 13px; color: var(--teal); min-width: 60px; text-align: right;
  }

  .results-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .btn-action {
    padding: 14px 32px; border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    border: none;
  }
  .btn-action.primary {
    background: linear-gradient(135deg, var(--teal), var(--teal-light));
    color: var(--navy);
    box-shadow: 0 0 30px rgba(0,180,166,0.3);
  }
  .btn-action.primary:hover { transform: scale(1.05); }
  .btn-action.secondary {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--white);
  }
  .btn-action.secondary:hover { border-color: var(--teal); }

  /* ══════════════════════════════════════════
     REVIEW SCREEN
  ══════════════════════════════════════════ */
  #review { min-height: 100vh; padding: 32px 20px 80px; max-width: 820px; margin: 0 auto; }

  .review-header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
  .review-header h2 { font-family: 'Playfair Display', serif; font-size: 28px; }
  .btn-back {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 30px; padding: 8px 18px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--gray-300); cursor: pointer; transition: all 0.2s;
  }
  .btn-back:hover { border-color: var(--teal); color: var(--teal); }

  .review-filter {
    display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border);
    background: none; color: var(--gray-300);
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .filter-btn.active { background: rgba(0,180,166,0.1); border-color: var(--teal); color: var(--teal); }
  .filter-btn.correct-filter.active { background: rgba(16,185,129,0.1); border-color: var(--correct); color: var(--correct); }
  .filter-btn.wrong-filter.active { background: rgba(239,68,68,0.1); border-color: var(--wrong); color: var(--wrong); }

  .review-q-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; margin-bottom: 16px;
  }
  .review-q-card.correct-card { border-color: rgba(16,185,129,0.3); }
  .review-q-card.wrong-card { border-color: rgba(239,68,68,0.3); }
  .review-q-card.skip-card { border-color: rgba(245,166,35,0.3); }

  .review-q-top {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap;
  }
  .review-badge {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    padding: 4px 10px; border-radius: 20px; text-transform: uppercase;
  }
  .badge-correct { background: rgba(16,185,129,0.15); color: var(--correct); }
  .badge-wrong { background: rgba(239,68,68,0.12); color: var(--wrong); }
  .badge-skip { background: rgba(245,166,35,0.12); color: var(--gold); }

  .review-q-text { font-size: 15px; font-weight: 500; margin-bottom: 16px; line-height: 1.6; }
  .review-answers { font-size: 13.5px; line-height: 1.8; }
  .review-correct { color: var(--correct); }
  .review-wrong { color: var(--wrong); }

  /* ANIMATIONS */
  @keyframes fadeSlideDown { from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0}to{opacity:1} }

  .confetti-wrap {
    position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden;
  }
  .confetti-piece {
    position: absolute; top: -10px;
